<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" style="background-color: white;">
  <defs>
    <filter id="displacement">
      <feTurbulence type="turbulence" baseFrequency="0.05" numOctaves="2" result="turbulence"/>
      <feDisplacementMap in2="turbulence" in="SourceGraphic" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g stroke="black" stroke-width="2" fill="none" filter="url(#displacement)">
    <!-- Neural Network Nodes -->
    <circle cx="50" cy="50" r="10" />
    <circle cx="50" cy="150" r="10" />
    <circle cx="150" cy="100" r="10" />
    <circle cx="250" cy="50" r="10" />
    <circle cx="250" cy="150" r="10" />
    <circle cx="350" cy="100" r="10" />
    
    <!-- Connections -->
    <path d="M60 50 L140 100" />
    <path d="M60 150 L140 100" />
    <path d="M160 100 L240 50" />
    <path d="M160 100 L240 150" />
    <path d="M260 50 L340 100" />
    <path d="M260 150 L340 100" />
    
    <!-- Brain Outline Abstract -->
    <path d="M100 20 Q150 5 200 20 T300 20" stroke-dasharray="5,5" />
    <path d="M100 180 Q150 195 200 180 T300 180" stroke-dasharray="5,5" />
  </g>
</svg>
